name: Android Release Build (Unsigned)

on:
  # 手动触发（推荐）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle for faster builds
        run: |
          {
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
            echo "android.nonTransitiveRClass=true"
          } >> gradle.properties

      - name: Backup original build.gradle.kts
        run: |
          if [ -f "app/build.gradle.kts" ]; then
            cp app/build.gradle.kts app/build.gradle.kts.bak
            echo "Found app/build.gradle.kts"
            
            # 检查是否已有buildTypes
            if grep -q "buildTypes" app/build.gradle.kts; then
              # 如果已有buildTypes，在其内部添加unsignedRelease
              sed -i '/buildTypes\s*{/,/^[[:space:]]*}/ {
                /^[[:space:]]*}/!b
                /^[[:space:]]*}/ {
                  i\        create("unsignedRelease") {\
            \            initWith(getByName("release"))\
            \            signingConfig = null\
            \        }
                  p
                }
              }' app/build.gradle.kts
            else
              # 如果没有buildTypes，添加整个block
              sed -i '/android\s*{/a\
              buildTypes {\
                  create("unsignedRelease") {\
                      initWith(getByName("release"))\
                      signingConfig = null\
                  }\
              }' app/build.gradle.kts
            fi
          else
            echo "ERROR: app/build.gradle.kts not found"
            exit 1
          fi

      - name: Build Unsigned Release APK
        run: |
          ./gradlew assembleUnsignedRelease \
            --no-daemon \
            --max-workers=2

      # 恢复原始build.gradle.kts文件
      - name: Restore original build.gradle.kts
        run: |
          if [ -f "app/build.gradle.kts.bak" ]; then
            mv app/build.gradle.kts.bak app/build.gradle.kts
          fi

      # 输出当前生成的 APK 产物（文件名、路径、大小）
      - name: List built APK files
        run: |
          echo "=== 生成的 Unsigned Release APK 如下 ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \; || echo "No APK files found"
          echo "================================"

      - name: Upload Unsigned APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk
          path: app/build/outputs/apk/**/**/*.apk
          if-no-files-found: warn
