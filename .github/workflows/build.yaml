name: Android Release Build (Multi-Arch Support)

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Product Flavor to build'
        required: true
        default: 'default'
        type: choice
        options:
        - google
        - default
        - meitu
        - samsung
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'both'
        type: choice
        options:
        - both
        - arm64-v8a
        - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          {
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
            echo "android.nonTransitiveRClass=true"
          } >> gradle.properties

      - name: Configure ABI Filters based on input
        run: |
          if [ "${{ inputs.architecture }}" == "both" ]; then
            echo "Configuring for both architectures: arm64-v8a, armeabi-v7a"
            sed -i 's/abiFilters += listOf("arm64-v8a")/abiFilters += listOf("arm64-v8a", "armeabi-v7a")/' app/build.gradle.kts
          elif [ "${{ inputs.architecture }}" == "arm64-v8a" ]; then
            echo "Configuring for 64-bit only: arm64-v8a"
            sed -i 's/abiFilters += listOf("arm64-v8a", "armeabi-v7a")/abiFilters += listOf("arm64-v8a")/' app/build.gradle.kts
          elif [ "${{ inputs.architecture }}" == "armeabi-v7a" ]; then
            echo "Configuring for 32-bit only: armeabi-v7a"
            sed -i 's/abiFilters += listOf("arm64-v8a", "armeabi-v7a")/abiFilters += listOf("armeabi-v7a")/' app/build.gradle.kts
          fi

      - name: Show modified build configuration
        run: |
          echo "=== Current ABI Configuration ==="
          grep -A 5 "ndk {" app/build.gradle.kts | grep -E "(abiFilters|listOf)"
          echo "================================="

      - name: Build Unsigned Release APK for selected flavor and architecture
        run: |
          ./gradlew assemble${{ inputs.flavor }}UnsignedRelease \
            --no-daemon \
            --max-workers=2

      # 输出当前生成的 APK 产物（文件名、路径、大小）
      - name: List built APK files
        run: |
          echo "=== Generated Unsigned Release APK Files ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \; || echo "No APK files found"
          echo "============================================"

      - name: Upload Unsigned APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.flavor }}-unsigned-${{ inputs.architecture }}-apks
          path: app/build/outputs/apk/**/**/*.apk
          if-no-files-found: warn
