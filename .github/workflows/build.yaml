name: Android Release Build (Unsigned)

on:
  # 手动触发（推荐）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle for faster builds
        run: |
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.configureondemand=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC" >> gradle.properties

      - name: Create unsigned release build variant
        run: |
          # 备份原始文件
          cp app/build.gradle app/build.gradle.bak
          
          # 在build.gradle中添加unsignedRelease构建类型
          sed -i '/android {/a\
          buildTypes {\
              release {\
                  minifyEnabled false\
                  proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\
                  signingConfig null\
              }\
              unsignedRelease {\
                  initWith release\
                  matchingFallbacks = ["release"]\
              }\
          }' app/build.gradle

      - name: Build Unsigned Release APK
        run: |
          ./gradlew assembleUnsignedRelease \
            --no-daemon \
            --max-workers=2

      # 恢复原始build.gradle文件
      - name: Restore original build.gradle
        run: mv app/build.gradle.bak app/build.gradle || true

      # 输出当前生成的 APK 产物（文件名、路径、大小）
      - name: List built APK files
        run: |
          echo "=== 生成的 Unsigned Release APK 如下 ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \; || echo "No APK files found"
          echo "================================"

      - name: Upload Unsigned APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk
          path: app/build/outputs/apk/**/**/*.apk
          if-no-files-found: warn
