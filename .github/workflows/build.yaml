name: Photon Camera Build Workflow

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Product Flavor to build'
        required: true
        default: 'default'
        type: choice
        options:
        - google
        - default
        - meitu
        - samsung
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'both'
        type: choice
        options:
        - both
        - arm64-v8a
        - armeabi-v7a
      build_type:
        description: 'Build Type'
        required: true
        default: 'unsignedRelease'
        type: choice
        options:
        - unsignedRelease
        - release
        - debug

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools platforms;android-34 build-tools;34.0.0 cmake;3.22.1 ndk;25.1.8937393

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            ~/.cmake
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          {
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
            echo "android.nonTransitiveRClass=true"
            echo "android.enableAppCompileTimeRClass=true"
            echo "android.suppressUnsupportedCompileSdk=34"
          } >> gradle.properties

      - name: Configure ABI Filters based on input
        run: |
          if [ "${{ inputs.architecture }}" == "both" ]; then
            echo "Configuring for both architectures: arm64-v8a, armeabi-v7a"
            sed -i 's/abiFilters += listOf("[^"]*")/abiFilters += listOf("arm64-v8a", "armeabi-v7a")/g' app/build.gradle.kts
          elif [ "${{ inputs.architecture }}" == "arm64-v8a" ]; then
            echo "Configuring for 64-bit only: arm64-v8a"
            sed -i 's/abiFilters += listOf("[^"]*")/abiFilters += listOf("arm64-v8a")/g' app/build.gradle.kts
          elif [ "${{ inputs.architecture }}" == "armeabi-v7a" ]; then
            echo "Configuring for 32-bit only: armeabi-v7a"
            sed -i 's/abiFilters += listOf("[^"]*")/abiFilters += listOf("armeabi-v7a")/g' app/build.gradle.kts
          fi

      - name: Show modified build configuration
        run: |
          echo "=== Current ABI Configuration ==="
          grep -A 10 "ndk {" app/build.gradle.kts | grep -E "(abiFilters|listOf)"
          echo "================================="

      - name: Check CMakeLists.txt
        run: |
          echo "Checking CMake configuration..."
          if [ -f "app/src/main/cpp/CMakeLists.txt" ]; then
            echo "CMakeLists.txt found at app/src/main/cpp/"
            cat app/src/main/cpp/CMakeLists.txt
          elif [ -f "CMakeLists.txt" ]; then
            echo "CMakeLists.txt found at root"
            cat CMakeLists.txt
          else
            echo "Searching for CMakeLists.txt..."
            find . -name "CMakeLists.txt" -exec echo "Found: {}" \;
          fi

      - name: Prepare CMake build directory
        run: |
          mkdir -p app/.cxx
          echo "CMake build directory prepared"

      - name: Clean previous builds
        run: |
          ./gradlew clean --no-daemon

      - name: Build with specific NDK and CMake versions
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          export CMAKE_PATH=$ANDROID_SDK_ROOT/cmake/3.22.1/bin
          
          echo "NDK Version: $(cat $ANDROID_NDK_HOME/source.properties | grep Pkg.Revision)"
          echo "CMake Version: $($CMAKE_PATH/cmake --version)"
          
          ./gradlew assemble${{ inputs.flavor }}${{ inputs.build_type }} \
            --no-daemon \
            --max-workers=1 \
            --info \
            -Pandroid.ndkVersion=25.1.8937393

      - name: List built APK files
        if: success()
        run: |
          echo "=== Generated APK Files ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \;
          echo "========================="

      - name: Generate build summary
        if: success()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "Flavor: ${{ inputs.flavor }}" >> $GITHUB_STEP_SUMMARY
          echo "Architecture: ${{ inputs.architecture }}" >> $GITHUB_STEP_SUMMARY
          echo "Build Type: ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          
          APK_COUNT=$(find . -path "*/build/outputs/apk/*" -name "*.apk" | wc -l)
          echo "Generated APKs: $APK_COUNT" >> $GITHUB_STEP_SUMMARY
          
          if [ $APK_COUNT -gt 0 ]; then
            echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
            find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \; >> $GITHUB_STEP_SUMMARY
          else
            echo "No APK files generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: photon-camera-${{ inputs.flavor }}-${{ inputs.architecture }}-${{ inputs.build_type }}
          path: app/build/outputs/apk/**/**/*.apk
          if-no-files-found: error
          retention-days: 30

  validate:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-apks

      - name: Validate APK integrity
        run: |
          for apk_file in $(find downloaded-apks -name "*.apk"); do
            echo "Validating: $apk_file"
            file "$apk_file"
            ls -lh "$apk_file"
            
            # Basic APK validation
            if command -v zip >/dev/null 2>&1; then
              zip -T "$apk_file"
            fi
          done

      - name: Verify native libraries
        run: |
          for apk_file in $(find downloaded-apks -name "*.apk"); do
            echo "Checking native libraries in: $apk_file"
            temp_dir=$(mktemp -d)
            unzip -q "$apk_file" -d "$temp_dir"
            
            echo "Libraries in $apk_file:"
            if [ -d "$temp_dir/lib/arm64-v8a" ]; then
              echo "  arm64-v8a: $(ls -la $temp_dir/lib/arm64-v8a/ 2>/dev/null | grep '\.so$' | wc -l) .so files"
            else
              echo "  arm64-v8a: Not present"
            fi
            
            if [ -d "$temp_dir/lib/armeabi-v7a" ]; then
              echo "  armeabi-v7a: $(ls -la $temp_dir/lib/armeabi-v7a/ 2>/dev/null | grep '\.so$' | wc -l) .so files"
            else
              echo "  armeabi-v7a: Not present"
            fi
            
            rm -rf "$temp_dir"
          done
