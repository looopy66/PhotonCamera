name: Photon Camera Build Workflow

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Product Flavor to build'
        required: true
        default: 'default'
        type: choice
        options:
        - google
        - default
        - meitu
        - samsung
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'both'
        type: choice
        options:
        - both
        - arm64-v8a
        - armeabi-v7a

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure Gradle properties
        run: |
          {
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
            echo "org.gradle.configureondemand=true"
            echo "org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC"
            echo "android.nonTransitiveRClass=true"
            echo "android.enableAppCompileTimeRClass=true"
          } >> gradle.properties

      - name: Apply 32-bit compatibility patches
        run: |
          # 备份原始文件
          cp app/src/main/cpp/stacking_utils.cpp app/src/main/cpp/stacking_utils.cpp.bak
          
          # 应用 NEON 兼容性补丁
          sed -i 's/vaddvq_u32(vacc)/(vget_lane_u32(vpadd_u32(vget_low_u32(vacc), vget_high_u32(vacc)), 0) + vget_lane_u32(vpadd_u32(vget_low_u32(vacc), vget_high_u32(vacc)), 1))/g' app/src/main/cpp/stacking_utils.cpp
          
          # 检查是否有其他类似的 NEON 指令
          grep -n "vaddvq_" app/src/main/cpp/stacking_utils.cpp || echo "No more vaddvq_ instructions found"

      - name: Configure ABI Filters
        run: |
          if [ "${{ inputs.architecture }}" == "both" ]; then
            echo "Building for both architectures: arm64-v8a, armeabi-v7a"
          elif [ "${{ inputs.architecture }}" == "arm64-v8a" ]; then
            echo "Building for 64-bit only: arm64-v8a"
          elif [ "${{ inputs.architecture }}" == "armeabi-v7a" ]; then
            echo "Building for 32-bit only: armeabi-v7a"
          fi

      - name: Build APK
        run: |
          ./gradlew assemble${{ inputs.flavor }}UnsignedRelease \
            --no-daemon \
            --max-workers=2

      - name: List built APK files
        run: |
          echo "=== Generated APK Files ==="
          find . -path "*/build/outputs/apk/*" -name "*.apk" -exec ls -lh {} \;
          echo "========================="

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: photon-camera-${{ inputs.flavor }}-${{ inputs.architecture }}-unsignedRelease
          path: app/build/outputs/apk/**/**/*.apk
          if-no-files-found: warn
          retention-days: 30
