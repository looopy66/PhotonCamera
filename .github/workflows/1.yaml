name: Build ARM 32-bit & 64-bit APKs

on:
  # 手动触发（推荐）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore (仅 Release 需要)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > app/release.keystore

      - name: Build ARM Debug APKs (32-bit + 64-bit)
        if: github.event_name != 'release'
        run: ./gradlew assembleDefaultDebug

      - name: Build ARM Release APKs (32-bit + 64-bit)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          ./gradlew assembleDefaultRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload ARM 32-bit & 64-bit APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotonCamera-ARM-APKs
          path: app/build/outputs/apk/default/**/app-default-*.apk
          if-no-files-found: error
